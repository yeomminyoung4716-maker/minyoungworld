<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>벽돌곱창 순위 추적</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#0A0A0A;color:#F5F0E8}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
select option{background:#161616}
input[type=number]::-webkit-inner-spin-button{opacity:0.4}
input::placeholder,textarea::placeholder{color:#444}
button{cursor:pointer;font-family:'Noto Sans KR',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const {LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend}=Recharts;

const DEFAULT_BRANCHES=[
  {id:1,name:"서울 마곡본점",url:"",keywords:["발산역곱창","마곡맛집","마곡곱창"]},
  {id:2,name:"인천 영종도점",url:"",keywords:["인천중산동맛집","인천중산동곱창","영종도곱창","영종도맛집"]},
  {id:3,name:"천안 불당점",url:"",keywords:["천안 맛집","불당동 맛집","천안곱창","불당동 곱창"]},
  {id:4,name:"천안 성정점",url:"",keywords:["천안 맛집","성정동맛집","천안곱창","성정동곱창"]},
  {id:5,name:"아산 용화점",url:"",keywords:["아산맛집","아산 용화동맛집","아산곱창","아산용화동곱창"]},
  {id:6,name:"세종 나성점",url:"",keywords:["나성동 맛집","나성동 곱창","세종곱창"]},
  {id:7,name:"청주 오송점",url:"",keywords:["청주곱창","오송곱창"]},
  {id:8,name:"청주 지웰복대점",url:"",keywords:["청주맛집","지웰시티 맛집","복대동 맛집","청주곱창","지웰시티 곱창"]},
  {id:9,name:"청주 봉명점",url:"",keywords:["청주 봉명동 맛집","청주 봉명동 곱창","청주곱창"]},
  {id:10,name:"청주 강서점",url:"",keywords:["강서동 맛집","청주곱창","강서동 곱창"]},
  {id:11,name:"대전 시청본점",url:"",keywords:["대전둔산동맛집","대전시청맛집","대전곱창","대전시청곱창","둔산동곱창"]},
  {id:12,name:"대전 대흥점",url:"",keywords:["대전맛집","대전 대흥동 맛집","대전 대흥동 곱창","대전 곱창"]},
  {id:13,name:"대전 노은점",url:"",keywords:["대전 지족동 맛집","대전 노은역 맛집","대전곱창","지족동 곱창","노은동 곱창"]},
  {id:14,name:"대전 봉명점",url:"",keywords:["대전곱창","대전 봉명동 곱창","대전 봉명동 맛집"]},
  {id:15,name:"대전 관평점",url:"",keywords:["대전테크노벨리곱창","관평동곱창","관평동맛집"]},
  {id:16,name:"홍성 내포점",url:"",keywords:["홍성맛집","내포맛집","홍성곱창","내포곱창"]},
  {id:17,name:"광양 중마점",url:"",keywords:["광양맛집","중마동 맛집","광양곱창","중마동 곱창"]},
  {id:18,name:"군산 조촌점",url:"",keywords:["군산맛집","조촌동맛집","군산곱창","조촌동곱창"]},
  {id:19,name:"전주 에코시티점",url:"",keywords:["전주 송천동 맛집","에코시티맛집","전주곱창","에코시티곱창"]},
  {id:20,name:"전주 삼천점",url:"",keywords:["전주맛집","전주 삼천동 맛집","전주곱창"]},
  {id:21,name:"완주 삼봉지구점",url:"",keywords:["완주맛집","삼례맛집","삼봉지구 맛집","삼봉지구곱창","완주곱창"]},
  {id:22,name:"진천점",url:"",keywords:["진천맛집","충북혁신도시 맛집","진천곱창","충북혁신도시곱창"]},
];

const COLORS=["#FF6B35","#FF9F1C","#2EC4B6","#E71D36","#8B2FC9","#3A86FF","#06D6A0","#FB5607","#FFBE0B","#FF006E","#00B4D8","#80B918","#F72585","#4CC9F0","#7B2D8B","#E9C46A","#2A9D8F","#E76F51","#264653","#457B9D","#A8DADC","#F4A261"];
const SK_B="byukdol_branches";
const SK_R="byukdol_ranks";
const PW="2580";

function getTodayStr(){return new Date().toISOString().split("T")[0];}
function formatDate(d){if(!d)return"";const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}`;}
function kwKey(kw){return kw.replace(/[^a-zA-Z0-9가-힣]/g,"_");}

function App(){
  const [branches,setBranches]=useState(null);
  const [rankData,setRankData]=useState(null);
  const [storageReady,setStorageReady]=useState(false);
  const [activeTab,setActiveTab]=useState("dashboard");
  const [selectedBranch,setSelectedBranch]=useState(null);
  const [inputDate,setInputDate]=useState(getTodayStr());
  const [rankInputs,setRankInputs]=useState({});
  const [editingBranch,setEditingBranch]=useState(null);
  const [showAddBranch,setShowAddBranch]=useState(false);
  const [newBranch,setNewBranch]=useState({name:"",url:"",keywordsText:""});
  const [notification,setNotification]=useState(null);
  const [searchFilter,setSearchFilter]=useState("");
  const [selectedInputBranch,setSelectedInputBranch]=useState(null);
  const [selectedKeyword,setSelectedKeyword]=useState({});
  const [saving,setSaving]=useState(false);
  const [unlocked,setUnlocked]=useState(false);
  const [pwInput,setPwInput]=useState("");
  const [pwError,setPwError]=useState(false);
  const [trendFilter,setTrendFilter]=useState("all");

  useEffect(()=>{
    const b=localStorage.getItem(SK_B);
    const r=localStorage.getItem(SK_R);
    setBranches(b?JSON.parse(b):DEFAULT_BRANCHES);
    setRankData(r?JSON.parse(r):{});
    setStorageReady(true);
  },[]);

  const persist=useCallback((nb,nr)=>{
    setSaving(true);
    localStorage.setItem(SK_B,JSON.stringify(nb));
    localStorage.setItem(SK_R,JSON.stringify(nr));
    setTimeout(()=>setSaving(false),500);
  },[]);

  const showNotif=(msg,type="success")=>{setNotification({msg,type});setTimeout(()=>setNotification(null),2500);};
  const setInput=(bId,kw,field,val)=>setRankInputs(prev=>({...prev,[`${bId}__${kw}__${field}`]:val}));

  const getKeywordStats=(branchId,keyword)=>{
    const recs=((rankData[branchId]||{})[keyword]||[]).slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
    if(!recs.length)return{current:null,best:null,worst:null,prevCurrent:null,records:[]};
    const last=recs[recs.length-1];
    const prev=recs.length>=2?recs[recs.length-2]:null;
    const bestRanks=recs.map(r=>r.best!=null?r.best:r.current).filter(v=>v!=null&&v>0);
    const worstRanks=recs.map(r=>r.worst!=null?r.worst:r.current).filter(v=>v!=null&&v>0);
    return{current:last.current??null,best:bestRanks.length?Math.min(...bestRanks):null,worst:worstRanks.length?Math.max(...worstRanks):null,prevCurrent:prev?.current??null,records:recs};
  };

  const getWeeklyTrend=(branchId,keyword)=>{
    const recs=((rankData[branchId]||{})[keyword]||[]).slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
    if(!recs.length)return"nodata";
    const latest=recs[recs.length-1];
    if(latest.current==null)return"nodata";
    const weekAgoDate=new Date(latest.date);weekAgoDate.setDate(weekAgoDate.getDate()-7);
    const older=recs.filter(r=>new Date(r.date)<=weekAgoDate&&r.current!=null);
    if(!older.length)return"nodata";
    const ref=older[older.length-1];
    const diff=ref.current-latest.current;
    if(diff>0)return"up";if(diff<0)return"down";return"same";
  };

  const getBranchWeeklyTrend=(branchId)=>{
    const b=branches.find(x=>x.id===branchId);if(!b)return"nodata";
    const counts={up:0,down:0,same:0,nodata:0};
    (b.keywords||[]).forEach(kw=>{counts[getWeeklyTrend(branchId,kw)]++;});
    const withData=(b.keywords||[]).length-counts.nodata;
    if(withData===0)return"nodata";
    if(counts.up>=counts.down&&counts.up>=counts.same)return"up";
    if(counts.down>counts.up&&counts.down>=counts.same)return"down";
    return"same";
  };

  const getBranchTrend=(branchId)=>{
    const b=branches.find(x=>x.id===branchId);if(!b)return null;
    let up=0,down=0,same=0,nodata=0;
    (b.keywords||[]).forEach(kw=>{
      const s=getKeywordStats(branchId,kw);
      if(s.current==null||s.prevCurrent==null){nodata++;return;}
      const diff=s.prevCurrent-s.current;
      if(diff>0)up++;else if(diff<0)down++;else same++;
    });
    return{up,down,same,nodata,total:(b.keywords||[]).length};
  };

  const saveRanks=()=>{
    const updated=JSON.parse(JSON.stringify(rankData));
    let count=0;const grouped={};
    Object.keys(rankInputs).forEach(k=>{
      const parts=k.split("__");const branchId=parseInt(parts[0]);const field=parts[parts.length-1];const keyword=parts.slice(1,parts.length-1).join("__");
      const gk=`${branchId}__${keyword}`;
      if(!grouped[gk])grouped[gk]={branchId,keyword,current:null,best:null,worst:null};
      grouped[gk][field]=rankInputs[k]!==""&&rankInputs[k]!=null?parseInt(rankInputs[k]):null;
    });
    Object.values(grouped).forEach(({branchId,keyword,current,best,worst})=>{
      if(current==null&&best==null&&worst==null)return;
      if(!updated[branchId])updated[branchId]={};
      if(!updated[branchId][keyword])updated[branchId][keyword]=[];
      const idx=updated[branchId][keyword].findIndex(r=>r.date===inputDate);
      const existing=idx>=0?updated[branchId][keyword][idx]:{};
      const newRec={date:inputDate,current:current??existing.current??null,best:best??existing.best??null,worst:worst??existing.worst??null};
      if(idx>=0)updated[branchId][keyword][idx]=newRec;else updated[branchId][keyword].push(newRec);
      count++;
    });
    setRankData(updated);setRankInputs({});persist(branches,updated);
    showNotif(`${count}개 키워드 순위 저장 완료!`);
  };

  const deleteRecord=(branchId,keyword,date)=>{
    const updated=JSON.parse(JSON.stringify(rankData));
    if(updated[branchId]?.[keyword]){
      updated[branchId][keyword]=updated[branchId][keyword].filter(r=>r.date!==date);
      setRankData(updated);persist(branches,updated);showNotif("삭제되었습니다.");
    }
  };

  const exportCSV=()=>{
    const rows=[["지점명","키워드","날짜","현재순위","최고순위","최저순위"]];
    branches.forEach(b=>{(b.keywords||[]).forEach(kw=>{((rankData[b.id]||{})[kw]||[]).slice().sort((a,c)=>new Date(a.date)-new Date(c.date)).forEach(r=>{rows.push([b.name,kw,r.date,r.current??"",r.best??"",r.worst??""]);});});});
    const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"})),download:`벽돌곱창_순위_${getTodayStr()}.csv`,style:"display:none"});
    document.body.appendChild(a);a.click();setTimeout(()=>document.body.removeChild(a),100);
    showNotif("CSV 다운로드 완료!");
  };

  const addBranch=()=>{
    if(!newBranch.name.trim())return;
    const keywords=newBranch.keywordsText.split("\n").map(s=>s.trim()).filter(Boolean);
    const updated=[...branches,{id:Date.now(),name:newBranch.name,url:newBranch.url,keywords}];
    setBranches(updated);setNewBranch({name:"",url:"",keywordsText:""});setShowAddBranch(false);
    persist(updated,rankData);showNotif("지점이 추가되었습니다.");
  };

  const deleteBranch=(id)=>{
    const updatedB=branches.filter(b=>b.id!==id);
    const updatedR=JSON.parse(JSON.stringify(rankData));delete updatedR[id];
    setBranches(updatedB);setRankData(updatedR);persist(updatedB,updatedR);showNotif("지점이 삭제되었습니다.");
  };

  const updateBranch=()=>{
    const keywords=typeof editingBranch.keywordsText==="string"?editingBranch.keywordsText.split("\n").map(s=>s.trim()).filter(Boolean):editingBranch.keywords;
    const updated=branches.map(b=>b.id===editingBranch.id?{...editingBranch,keywords}:b);
    setBranches(updated);setEditingBranch(null);persist(updated,rankData);showNotif("수정되었습니다.");
  };

  const getAllDates=(branchId,keyword)=>[...new Set(((rankData[branchId]||{})[keyword]||[]).map(r=>r.date))].sort();

  const tryUnlock=()=>{
    if(pwInput===PW){setUnlocked(true);setPwError(false);}
    else{setPwError(true);setPwInput("");}
  };

  if(!unlocked)return(
    <div style={{minHeight:"100vh",background:"#0A0A0A",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
      <div style={{width:56,height:56,background:"#FF6B35",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>🧱</div>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:22,fontWeight:900,color:"#FF6B35",marginBottom:4}}>벽돌곱창</div>
        <div style={{fontSize:13,color:"#555"}}>접근하려면 비밀번호를 입력하세요</div>
      </div>
      <div style={{background:"#161616",border:"1px solid #2A2A2A",borderRadius:16,padding:32,width:300,display:"flex",flexDirection:"column",gap:14}}>
        <input type="password" value={pwInput} onChange={e=>{setPwInput(e.target.value);setPwError(false);}} onKeyDown={e=>e.key==="Enter"&&tryUnlock()} placeholder="비밀번호 입력" autoFocus
          style={{background:"#0A0A0A",border:`1px solid ${pwError?"#E71D36":"#333"}`,color:"#F5F0E8",padding:"12px 16px",borderRadius:10,fontSize:15,textAlign:"center",letterSpacing:4,outline:"none"}}/>
        {pwError&&<div style={{color:"#E71D36",fontSize:12,textAlign:"center"}}>비밀번호가 올바르지 않습니다</div>}
        <button onClick={tryUnlock} style={{background:"#FF6B35",border:"none",color:"#fff",padding:12,borderRadius:10,fontSize:15,fontWeight:800}}>🔓 입장</button>
      </div>
    </div>
  );

  if(!storageReady)return(<div style={{minHeight:"100vh",background:"#0A0A0A",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"#FF6B35"}}>로딩 중...</div></div>);

  const filteredBranches=branches.filter(b=>b.name.includes(searchFilter)||searchFilter==="");
  const inputBranches=selectedInputBranch?branches.filter(b=>b.id===selectedInputBranch):branches;

  const TrendBadge=({diff})=>{
    if(diff==null)return<span style={{fontSize:11,color:"#444"}}>-</span>;
    if(diff>0)return<span style={{fontSize:12,fontWeight:700,color:"#2EC4B6"}}>▲{diff}</span>;
    if(diff<0)return<span style={{fontSize:12,fontWeight:700,color:"#E71D36"}}>▼{Math.abs(diff)}</span>;
    return<span style={{fontSize:12,fontWeight:700,color:"#888"}}>━</span>;
  };

  const branchTrendList=branches.map(b=>{
    const overall=getBranchWeeklyTrend(b.id);
    const kwDetails=(b.keywords||[]).map(kw=>{
      const t=getWeeklyTrend(b.id,kw);
      const recs=((rankData[b.id]||{})[kw]||[]).slice().sort((a,c)=>new Date(a.date)-new Date(c.date));
      const latest=recs[recs.length-1];
      const weekAgoDate=latest?new Date(latest.date):null;
      if(weekAgoDate)weekAgoDate.setDate(weekAgoDate.getDate()-7);
      const older=weekAgoDate?recs.filter(r=>new Date(r.date)<=weekAgoDate&&r.current!=null):[];
      const refRec=older[older.length-1];
      return{kw,trend:t,current:latest?.current??null,ref:refRec?.current??null,diff:(refRec?.current!=null&&latest?.current!=null)?(refRec.current-latest.current):null};
    });
    return{...b,overall,kwDetails};
  });

  const trendCounts={up:0,down:0,same:0,nodata:0};
  branchTrendList.forEach(b=>trendCounts[b.overall]++);
  const filteredTrendList=trendFilter==="all"?branchTrendList:branchTrendList.filter(b=>b.overall===trendFilter);

  return(
    <div style={{minHeight:"100vh",background:"#0A0A0A",color:"#F5F0E8",paddingBottom:60}}>
      {notification&&<div style={{position:"fixed",top:20,right:20,zIndex:9999,background:notification.type==="success"?"#FF6B35":"#E71D36",color:"#fff",padding:"12px 24px",borderRadius:8,fontWeight:700,fontSize:14,boxShadow:"0 4px 20px rgba(255,107,53,0.4)"}}>{notification.msg}</div>}
      {saving&&<div style={{position:"fixed",bottom:20,right:20,zIndex:9998,background:"#161616",border:"1px solid #333",color:"#888",padding:"8px 16px",borderRadius:8,fontSize:12}}>💾 저장 중...</div>}

      <div style={{background:"linear-gradient(135deg,#1A0A00,#0A0A0A)",borderBottom:"2px solid #FF6B35",padding:"20px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{width:44,height:44,background:"#FF6B35",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🧱</div>
          <div>
            <div style={{fontSize:20,fontWeight:900,color:"#FF6B35"}}>벽돌곱창</div>
            <div style={{fontSize:12,color:"#888",marginTop:2}}>네이버 플레이스 키워드 순위 추적</div>
          </div>
        </div>
        <button onClick={exportCSV} style={{background:"transparent",border:"1px solid #FF6B35",color:"#FF6B35",padding:"8px 16px",borderRadius:8,fontSize:13,fontWeight:600}}>📥 CSV 내보내기</button>
      </div>

      <div style={{display:"flex",borderBottom:"1px solid #222",padding:"0 24px",background:"#111",overflowX:"auto"}}>
        {[{k:"dashboard",l:"📊 대시보드"},{k:"trend",l:"🏆 상승/유지/하락"},{k:"input",l:"✏️ 순위 입력"},{k:"branches",l:"🏪 지점 관리"},{k:"chart",l:"📈 추이 차트"}].map(t=>(
          <button key={t.k} onClick={()=>setActiveTab(t.k)} style={{background:"transparent",border:"none",color:activeTab===t.k?"#FF6B35":"#666",padding:"14px 18px",fontSize:14,fontWeight:600,borderBottom:activeTab===t.k?"2px solid #FF6B35":"2px solid transparent",marginBottom:-1,whiteSpace:"nowrap"}}>
            {t.l}
          </button>
        ))}
      </div>

      <div style={{padding:24}}>

        {activeTab==="dashboard"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
              <h2 style={{margin:0,fontSize:20,fontWeight:900}}>대시보드</h2>
              <input value={searchFilter} onChange={e=>setSearchFilter(e.target.value)} placeholder="지점 검색..." style={{background:"#161616",border:"1px solid #333",color:"#F5F0E8",padding:"8px 14px",borderRadius:8,fontSize:13,width:200,outline:"none"}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
              {filteredBranches.map((b,idx)=>{
                const trend=getBranchTrend(b.id);const kws=b.keywords||[];
                return(

                            <CartesianGrid strokeDasharray="3 3" stroke="#1E1E1E"/>
                            <XAxis dataKey="date" stroke="#444" tick={{fontSize:11,fill:"#666"}}/>
                            <YAxis reversed stroke="#444" tick={{fontSize:11,fill:"#666"}} domain={["dataMin - 1","dataMax + 1"]}/>
                            <Tooltip contentStyle={{background:"#1A1A1A",border:"1px solid #333",borderRadius:8}} labelStyle={{color:"#888",fontSize:12}} itemStyle={{fontSize:12}} formatter={(v,n)=>v!=null?[`${v}위`,n]:["-",n]}/>
                            <Legend wrapperStyle={{fontSize:10}}/>
                            {activeKws.map((kw)=>{
                              const c=COLORS[kws.indexOf(kw)%COLORS.length];const k=kwKey(kw);
                              return[
                                <Line key={`${k}_cur`} type="monotone" dataKey={`${k}_cur`} name={`${kw} 현재`} stroke={c} strokeWidth={2} dot={{r:3}} connectNulls={false}/>,
                                <Line key={`${k}_best`} type="monotone" dataKey={`${k}_best`} name={`${kw} 최고`} stroke={c} strokeWidth={1.5} strokeDasharray="6 3" dot={false} connectNulls={false}/>,
                                <Line key={`${k}_worst`} type="monotone" dataKey={`${k}_worst`} name={`${kw} 최저`} stroke={c} strokeWidth={1.5} strokeDasharray="2 3" dot={false} connectNulls={false}/>,
                              ];
                            })}
                          </LineChart>
                        </ResponsiveContainer>
                      </div>
                      <div style={{background:"#161616",border:"1px solid #2A2A2A",borderRadius:12,overflow:"hidden"}}>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                          <thead><tr style={{background:"#111"}}>{["키워드","기록수","현재순위","최고순위","최저순위","변동"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",color:"#666",fontWeight:600,borderBottom:"1px solid #222"}}>{h}</th>)}</tr></thead>
                          <tbody>
                            {kws.map(kw=>{
                              const s=getKeywordStats(b.id,kw);const diff=(s.current!=null&&s.prevCurrent!=null)?s.prevCurrent-s.current:null;
                              return(<tr key={kw} style={{borderBottom:"1px solid #1A1A1A"}}>
                                <td style={{padding:"9px 14px",fontWeight:600}}>{kw}</td>
                                <td style={{padding:"9px 14px",color:"#666"}}>{s.records.length}회</td>
                                <td style={{padding:"9px 14px",fontWeight:800}}>{s.current!=null?`${s.current}위`:"-"}</td>
                                <td style={{padding:"9px 14px",fontWeight:800,color:"#2EC4B6"}}>{s.best!=null?`${s.best}위`:"-"}</td>
                                <td style={{padding:"9px 14px",fontWeight:800,color:"#E71D36"}}>{s.worst!=null?`${s.worst}위`:"-"}</td>
                                <td style={{padding:"9px 14px"}}><TrendBadge diff={diff}/></td>
                              </tr>);
                            })}
                          </tbody>
                        </table>
                      </div>
                    </>
                  )}
                </div>
              );
            })():(
              <div style={{textAlign:"center",padding:"80px 20px",color:"#444",background:"#161616",borderRadius:12}}>
                <div style={{fontSize:48,marginBottom:12}}>📈</div>
                <div style={{fontSize:15}}>위에서 지점을 선택하면 키워드별 순위 추이를 확인할 수 있습니다</div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
