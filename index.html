const COLORS=["#FF6B35","#FF9F1C","#2EC4B6","#E71D36","#8B2FC9","#3A86FF","#06D6A0","#FB5607","#FFBE0B","#FF006E","#00B4D8","#80B918","#F72585","#4CC9F0","#7B2D8B","#E9C46A","#2A9D8F","#E76F51","#264653","#457B9D","#A8DADC","#F4A261"];
const PW="2580";
const SK_B="byukdol_branches";
const SK_R="byukdol_ranks";

let state={
  unlocked:false,pwInput:"",pwError:false,
  branches:JSON.parse(localStorage.getItem(SK_B)||"null")||DEFAULT_BRANCHES,
  rankData:JSON.parse(localStorage.getItem(SK_R)||"{}"),
  activeTab:"dashboard",
  inputDate:new Date().toISOString().split("T")[0],
  rankInputs:{},
  selectedInputBranch:null,
  searchFilter:"",
  notification:null,
  trendFilter:"all",

};

function save(){
  localStorage.setItem(SK_B,JSON.stringify(state.branches));
  localStorage.setItem(SK_R,JSON.stringify(state.rankData));
}

function notify(msg){
  state.notification=msg;render();
  setTimeout(()=>{state.notification=null;render();},2500);
}

function getTodayStr(){return new Date().toISOString().split("T")[0];}
function formatDate(d){if(!d)return"";const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}`;}

function getStats(branchId,keyword){
  const recs=((state.rankData[branchId]||{})[keyword]||[]).slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!recs.length)return{current:null,best:null,worst:null,prev:null,records:[]};
  const last=recs[recs.length-1];
  const prev=recs.length>=2?recs[recs.length-2]:null;
  const bests=recs.map(r=>r.best!=null?r.best:r.current).filter(v=>v!=null&&v>0);
  const worsts=recs.map(r=>r.worst!=null?r.worst:r.current).filter(v=>v!=null&&v>0);
  return{current:last.current??null,best:bests.length?Math.min(...bests):null,worst:worsts.length?Math.max(...worsts):null,prev:prev?.current??null,records:recs};
}

function getWeeklyTrend(branchId,keyword){
  const recs=((state.rankData[branchId]||{})[keyword]||[]).slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!recs.length)return"nodata";
  const latest=recs[recs.length-1];
  if(latest.current==null)return"nodata";
  const wago=new Date(latest.date);wago.setDate(wago.getDate()-7);
  const older=recs.filter(r=>new Date(r.date)<=wago&&r.current!=null);
  if(!older.length)return"nodata";
  const ref=older[older.length-1];
  const diff=ref.current-latest.current;
  if(diff>0)return"up";if(diff<0)return"down";return"same";
}

function getBranchWeeklyTrend(branchId){
  const b=state.branches.find(x=>x.id===branchId);if(!b)return"nodata";
  const c={up:0,down:0,same:0,nodata:0};
  (b.keywords||[]).forEach(kw=>{c[getWeeklyTrend(branchId,kw)]++;});
  const wd=(b.keywords||[]).length-c.nodata;
  if(wd===0)return"nodata";
  if(c.up>=c.down&&c.up>=c.same)return"up";
  if(c.down>c.up&&c.down>=c.same)return"down";
  return"same";
}

function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false)return;
      el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
    });
  }
  return el;
}

    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:"14px"}},

        const kws=b.keywords||[];

          h("div",{style:{fontSize:"14px",fontWeight:"800",marginBottom:"14px"}},b.name),
          h("div",{style:{display:"flex",flexDirection:"column",gap:"4px"}},
            kws.map(kw=>{
              const s=getStats(b.id,kw);
              const diff=(s.current!=null&&s.prev!=null)?s.prev-s.current:null;
              return h("div",{style:{display:"grid",gridTemplateColumns:"1fr 40px 40px 40px 40px",gap:"4px",alignItems:"center",padding:"5px 8px",background:"#0A0A0A",borderRadius:"6px"}},[
                h("div",{style:{fontSize:"11px",color:"#999",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},kw),
                h("div",{style:{textAlign:"center"}},[h("div",{style:{fontSize:"13px",fontWeight:"800",color:s.current!=null?"#F5F0E8":"#333"}},s.current!=null?s.current:"–"),h("div",{style:{fontSize:"9px",color:"#555"}},"현재")]),
                h("div",{style:{textAlign:"center"}},[h("div",{style:{fontSize:"13px",fontWeight:"800",color:s.best!=null?"#2EC4B6":"#333"}},s.best!=null?s.best:"–"),h("div",{style:{fontSize:"9px",color:"#555"}},"최고")]),

function renderTrend(){
  const cfg={up:{label:"상승",color:"#2EC4B6",bg:"rgba(46,196,182,0.1)",icon:"📈"},same:{label:"유지",color:"#888",bg:"rgba(255,255,255,0.05)",icon:"➡️"},down:{label:"하락",color:"#E71D36",bg:"rgba(231,29,54,0.1)",icon:"📉"},nodata:{label:"데이터없음",color:"#555",bg:"rgba(255,255,255,0.03)",icon:"❓"}};
  const list=state.branches.map(b=>({...b,overall:getBranchWeeklyTrend(b.id),kwDetails:(b.keywords||[]).map(kw=>{
    const t=getWeeklyTrend(b.id,kw);
    const recs=((state.rankData[b.id]||{})[kw]||[]).slice().sort((a,c)=>new Date(a.date)-new Date(c.date));
    const latest=recs[recs.length-1];
    const wago=latest?new Date(latest.date):null;if(wago)wago.setDate(wago.getDate()-7);
    const older=wago?recs.filter(r=>new Date(r.date)<=wago&&r.current!=null):[];
    const ref=older[older.length-1];
    return{kw,trend:t,current:latest?.current??null,ref:ref?.current??null,diff:(ref?.current!=null&&latest?.current!=null)?(ref.current-latest.current):null};
  })}));
  const counts={up:0,down:0,same:0,nodata:0};list.forEach(b=>counts[b.overall]++);
  const filtered=state.trendFilter==="all"?list:list.filter(b=>b.overall===state.trendFilter);

  return h("div",{},[
    h("div",{style:{marginBottom:"20px"}},[
      h("h2",{style:{margin:"0 0 6px",fontSize:"20px",fontWeight:"900"}},"상승 / 유지 / 하락 현황"),
      h("div",{style:{fontSize:"12px",color:"#555"}},"1주일 전 데이터 대비 각 매장의 키워드 순위 변동"),
    ]),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginBottom:"24px"}},
      ["up","same","down","nodata"].map(k=>h("div",{
        style:{background:state.trendFilter===k?cfg[k].bg:"#161616",border:`1px solid ${state.trendFilter===k?cfg[k].color:"#2A2A2A"}`,borderRadius:"12px",padding:"16px 12px",textAlign:"center",cursor:"pointer"},
        onclick:()=>{state.trendFilter=state.trendFilter===k?"all":k;render();}},[
        h("div",{style:{fontSize:"24px",marginBottom:"6px"}},cfg[k].icon),
        h("div",{style:{fontSize:"28px",fontWeight:"900",color:cfg[k].color}},counts[k]),
        h("div",{style:{fontSize:"11px",color:"#666",marginTop:"2px"}},cfg[k].label),
      ]))
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}},
      filtered.map(b=>{
        const oc=cfg[b.overall];
        return h("div",{style:{background:"#161616",border:`1px solid ${b.overall==="nodata"?"#1E1E1E":oc.color+"44"}`,borderRadius:"12px",overflow:"hidden",borderLeft:`4px solid ${COLORS[state.branches.indexOf(b)%COLORS.length]}`}},[
          h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",background:oc.bg}},[
            h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},[
              h("span",{style:{fontSize:"18px"}},oc.icon),
              h("span",{style:{fontSize:"15px",fontWeight:"800"}},b.name),
            ]),
            h("span",{style:{fontSize:"12px",fontWeight:"700",color:oc.color,border:`1px solid ${oc.color}55`,padding:"3px 12px",borderRadius:"20px"}},oc.label),
          ]),
          h("div",{},b.kwDetails.map(({kw,trend,current,ref,diff})=>{
            const kc={up:{color:"#2EC4B6",icon:"▲"},same:{color:"#888",icon:"━"},down:{color:"#E71D36",icon:"▼"},nodata:{color:"#444",icon:"?"}}[trend];
            return h("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"9px 18px",borderTop:"1px solid #111"}},[
              h("span",{style:{fontSize:"16px",minWidth:"20px",color:kc.color,fontWeight:"900"}},kc.icon),
              h("span",{style:{flex:"1",fontSize:"12px",color:"#AAA",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},kw),
              trend!=="nodata"?h("div",{style:{display:"flex",alignItems:"center",gap:"6px",flexShrink:"0"}},[
                h("span",{style:{fontSize:"11px",color:"#555"}},ref!=null?`${ref}위`:"?"),
                h("span",{style:{fontSize:"10px",color:"#333"}},"→"),
                h("span",{style:{fontSize:"13px",fontWeight:"800",color:"#F5F0E8"}},current!=null?`${current}위`:"-"),
                diff!=null&&diff!==0?h("span",{style:{fontSize:"11px",fontWeight:"700",color:kc.color,background:kc.color+"22",padding:"1px 7px",borderRadius:"20px"}},diff>0?`+${diff}`:`${diff}`):null,
              ]):h("span",{style:{fontSize:"11px",color:"#444"}},"1주일 전 데이터 없음"),
            ]);
          })),
        ]);
      })
    ),
  ]);
}

function renderInput(){
  const inputBranches=state.selectedInputBranch?state.branches.filter(b=>b.id===state.selectedInputBranch):state.branches;
  return h("div",{},[
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px",flexWrap:"wrap",gap:"12px"}},[
      h("h2",{style:{margin:"0",fontSize:"20px",fontWeight:"900"}},"순위 입력"),
      h("div",{style:{display:"flex",gap:"10px",flexWrap:"wrap",alignItems:"center"}},[
        h("input",{type:"date",value:state.inputDate,style:{background:"#161616",border:"1px solid #333",color:"#F5F0E8",padding:"9px 14px",borderRadius:"8px",fontSize:"14px",outline:"none"},
          onchange:e=>{state.inputDate=e.target.value;render();}}),
        (()=>{
          const sel=h("select",{style:{background:"#161616",border:"1px solid #333",color:"#F5F0E8",padding:"9px 14px",borderRadius:"8px",fontSize:"13px",outline:"none"},
            onchange:e=>{state.selectedInputBranch=e.target.value?parseInt(e.target.value):null;render();}},
            [h("option",{value:""},"전체 지점"),...state.branches.map(b=>{const o=h("option",{value:b.id},b.name);if(state.selectedInputBranch===b.id)o.selected=true;return o;})]);
          return sel;
        })(),
        h("button",{style:{background:"#FF6B35",border:"none",color:"#fff",padding:"9px 20px",borderRadius:"8px",fontSize:"14px",fontWeight:"800"},onclick:saveRanks},"💾 저장"),
      ]),
    ]),
    h("div",{style:{display:"flex",flexDirection:"column",gap:"16px"}},
      inputBranches.map(b=>h("div",{style:{background:"#161616",border:"1px solid #2A2A2A",borderRadius:"12px",overflow:"hidden",borderLeft:`3px solid ${COLORS[state.branches.indexOf(b)%COLORS.length]}`}},[
        h("div",{style:{padding:"12px 18px",borderBottom:"1px solid #1E1E1E",display:"flex",alignItems:"center",gap:"10px"}},[
          h("span",{style:{fontSize:"14px",fontWeight:"800"}},b.name),
          h("span",{style:{fontSize:"12px",color:"#555"}},(b.keywords||[]).length+"개 키워드"),
        ]),
        h("div",{},(b.keywords||[]).map(kw=>{
          const existing=((state.rankData[b.id]||{})[kw]||[]).find(r=>r.date===state.inputDate);
          const vCur=state.rankInputs[`${b.id}__${kw}__current`]??"";
          const vBest=state.rankInputs[`${b.id}__${kw}__best`]??"";
          const vWorst=state.rankInputs[`${b.id}__${kw}__worst`]??"";
          return h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"10px 16px",borderBottom:"1px solid #111"}},[
            h("div",{style:{flex:"1",minWidth:"0"}},[
              h("div",{style:{fontSize:"12px",fontWeight:"600",color:"#CCC",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},kw),
              existing?h("div",{style:{fontSize:"10px",color:"#444",marginTop:"2px"}},`저장: 현재 ${existing.current??"-"}위 / 최고 ${existing.best??"-"}위 / 최저 ${existing.worst??"-"}위`):null,
            ]),
            ...[{f:"current",v:vCur,c:"#F5F0E8",bc:"#F5F0E833"},{f:"best",v:vBest,c:"#2EC4B6",bc:"#2EC4B633"},{f:"worst",v:vWorst,c:"#E71D36",bc:"#E71D3633"}].map(({f,v,c,bc})=>{
              const inp=h("input",{type:"number",min:"1",style:{width:"52px",background:"#0A0A0A",border:`1px solid ${bc}`,color:c,padding:"6px 4px",borderRadius:"6px",fontSize:"13px",textAlign:"center",fontWeight:"700",outline:"none"},
                oninput:e=>{state.rankInputs[`${b.id}__${kw}__${f}`]=e.target.value;},});
              inp.value=v;inp.placeholder=existing?.[f]??"-";
              return h("div",{style:{display:"flex",alignItems:"center",gap:"3px",flexShrink:"0"}},[inp,h("span",{style:{fontSize:"10px",color:"#555"}},"위")]);
            }),
          ]);
        })),
      ]))
    ),
  ]);
}

function saveRanks(){
  const updated=JSON.parse(JSON.stringify(state.rankData));
  let count=0;const grouped={};
  Object.keys(state.rankInputs).forEach(k=>{
    const parts=k.split("__");const branchId=parseInt(parts[0]);const field=parts[parts.length-1];const keyword=parts.slice(1,parts.length-1).join("__");
    const gk=`${branchId}__${keyword}`;
    if(!grouped[gk])grouped[gk]={branchId,keyword,current:null,best:null,worst:null};
    grouped[gk][field]=state.rankInputs[k]!==""&&state.rankInputs[k]!=null?parseInt(state.rankInputs[k]):null;
  });
  Object.values(grouped).forEach(({branchId,keyword,current,best,worst})=>{
    if(current==null&&best==null&&worst==null)return;
    if(!updated[branchId])updated[branchId]={};
    if(!updated[branchId][keyword])updated[branchId][keyword]=[];
    const idx=updated[branchId][keyword].findIndex(r=>r.date===state.inputDate);
    const existing=idx>=0?updated[branchId][keyword][idx]:{};
    const newRec={date:state.inputDate,current:current??existing.current??null,best:best??existing.best??null,worst:worst??existing.worst??null};
    if(idx>=0)updated[branchId][keyword][idx]=newRec;else updated[branchId][keyword].push(newRec);
    count++;
  });
  state.rankData=updated;state.rankInputs={};save();
  notify(`${count}개 키워드 순위 저장 완료!`);
  render();
}

function renderBranches(){
  return h("div",{style:{maxWidth:"800px"}},[
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"24px"}},[
      h("h2",{style:{margin:"0",fontSize:"20px",fontWeight:"900"}},`지점 관리 (${state.branches.length}개)`),
    ]),
    h("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}},
      state.branches.map((b,idx)=>h("div",{style:{background:"#161616",border:"1px solid #2A2A2A",borderRadius:"12px",padding:"16px",borderLeft:`3px solid ${COLORS[idx%COLORS.length]}`}},[
        h("div",{style:{fontSize:"14px",fontWeight:"800",marginBottom:"10px"}},b.name),
        h("div",{style:{display:"flex",flexWrap:"wrap",gap:"4px"}},
          (b.keywords||[]).map(kw=>{
            const s=getStats(b.id,kw);
            return h("div",{style:{fontSize:"11px",padding:"3px 9px",borderRadius:"20px",background:"#111",color:"#999",border:"1px solid #222"}},[
              kw,s.current!=null?h("span",{style:{color:"#FF6B35",marginLeft:"4px",fontWeight:"700"}},s.current+"위"):null
            ]);
          })
        ),
      ]))
    ),
  ]);
}

function exportCSV(){
  const rows=[["지점명","키워드","날짜","현재순위","최고순위","최저순위"]];
  state.branches.forEach(b=>{(b.keywords||[]).forEach(kw=>{((state.rankData[b.id]||{})[kw]||[]).slice().sort((a,c)=>new Date(a.date)-new Date(c.date)).forEach(r=>{rows.push([b.name,kw,r.date,r.current??"",r.best??"",r.worst??""]);});});});
  const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"})),download:`벽돌곱창_순위_${getTodayStr()}.csv`,style:"display:none"});
  document.body.appendChild(a);a.click();setTimeout(()=>document.body.removeChild(a),100);
  notify("CSV 다운로드 완료!");
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(!state.unlocked){app.appendChild(renderLockScreen());return;}
  const wrap=h("div",{style:{minHeight:"100vh",background:"#0A0A0A",color:"#F5F0E8",paddingBottom:"60px"}},[
    state.notification?h("div",{className:"notif"},state.notification):null,
    renderHeader(),
    renderTabs(),
    h("div",{style:{padding:"24px"}},
      state.activeTab==="dashboard"?renderDashboard():
      state.activeTab==="trend"?renderTrend():
      state.activeTab==="input"?renderInput():
      renderBranches()
    ),
  ]);
  app.appendChild(wrap);
  if(!state.unlocked){setTimeout(()=>{const inp=document.querySelector("input[type=password]");if(inp)inp.focus();},50);}
}

render();
</script>
</body>
</html>
